<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dashboard Admin - GARDENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { 
            --primary: #db2777; 
            --accent: #6366f1; 
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text-main: #0f172a; 
            --text-mute: #64748b;
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }
        
        .dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-mute: #94a3b8;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg); margin: 0; color: var(--text-main); overflow-x: hidden; }

        .admin-container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--bg); padding-bottom: 40px; }

        .header-gradient {
            background: linear-gradient(135deg, #db2777 0%, #6366f1 100%);
            padding: calc(20px + var(--sat)) 24px 40px 24px;
            border-radius: 0 0 40px 40px;
            color: white;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }

        .main-card {
            background: var(--card-bg);
            margin: -25px 20px 20px 20px;
            padding: 24px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .filter-input {
            width: 100%;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 700;
            outline: none;
            color: #0f172a;
        }
        .dark .filter-input { background: #334155; border-color: #475569; color: white; }

        .swipe-container { position: relative; overflow: hidden; border-radius: 18px; margin-bottom: 10px; }
        .swipe-action { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: #ef4444; display: flex; align-items: center; justify-content: center; color: white; z-index: 1; border-radius: 0 18px 18px 0; }
        
        .log-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            background: var(--card-bg);
            position: relative;
            z-index: 2;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .scroll-area { max-height: 500px; overflow-y: auto; scrollbar-width: none; }
        .skeleton { background: #e2e8f0; background: linear-gradient(110deg, #eceff1 8%, #f5f5f5 18%, #eceff1 33%); background-size: 200% 100%; animation: shine 1.5s linear infinite; }
        @keyframes shine { to { background-position-x: -200%; } }

        .chart-container { width: 100%; height: 160px; margin-top: 15px; }

        .trend-up { color: #4ade80; font-size: 10px; font-weight: 800; }
        .trend-down { color: #f87171; font-size: 10px; font-weight: 800; }

        .alert-box {
            background: #fff1f2;
            border: 1px solid #fecdd3;
            padding: 12px;
            border-radius: 18px;
            margin: 0 20px 20px 20px;
        }
        .dark .alert-box { background: #451a03; border-color: #78350f; }

        .multi-select-bar {
            position: fixed; bottom: calc(20px + var(--sab)); left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--primary); color: white;
            padding: 12px 24px; border-radius: 20px; display: none; justify-content: space-between;
            align-items: center; z-index: 1000; box-shadow: 0 10px 30px rgba(219, 39, 119, 0.4);
        }
        
        .officer-list-card {
            background: var(--card-bg);
            margin: 20px;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Accordion Mobile Logic */
        @media (max-width: 640px) {
            .collapsible-content { 
                max-height: 0; 
                overflow: hidden; 
                transition: max-height 0.5s ease-out; 
            }
            .collapsible-content.active { max-height: 500px; margin-top: 15px; }
            .accordion-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
            .accordion-header::after { content: '▼'; font-size: 8px; opacity: 0.5; transition: 0.3s; }
            .accordion-header.active::after { transform: rotate(180deg); }
        }
    </style>
</head>
<body class="light">

<div class="admin-container">
    <div class="header-gradient">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white">ADMIN PANEL</h1>
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest text-white">Monitoring GARDENA</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDarkMode()" class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-white">🌓</button>
                <button onclick="manualRefresh()" id="btn-refresh" class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-white">🔄</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="stat-card col-span-2">
                <p class="text-[8px] font-black opacity-70 uppercase mb-1 text-white">Persentase Kehadiran Hari Ini</p>
                <div class="flex items-center justify-center gap-2">
                    <h3 id="stat-percent" class="text-3xl font-black text-white">0%</h3>
                    <div id="trend-percent" class="flex items-center"></div>
                </div>
                <p id="avg-time-in" class="text-[9px] font-bold text-white/70 mt-1 uppercase">Rata-rata Masuk: --:--</p>
                <div class="w-full bg-white/20 h-1.5 rounded-full mt-2 overflow-hidden">
                    <div id="stat-progress" class="bg-white h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="stat-card">
                <p class="text-[8px] font-black opacity-70 uppercase mb-1 text-white">Total Nakes</p>
                <h3 id="stat-total" class="text-xl font-black text-white">...</h3>
            </div>
            <div class="stat-card">
                <p class="text-[8px] font-black opacity-70 uppercase mb-1 text-white">Hadir Hari Ini</p>
                <h3 id="stat-hadir" class="text-xl font-black text-white">...</h3>
            </div>
            <div class="stat-card">
                <p class="text-[8px] font-black opacity-70 uppercase mb-1 text-white">Dinas Luar</p>
                <h3 id="stat-dl" class="text-xl font-black text-yellow-300">...</h3>
            </div>
        </div>
        
        <div class="chart-container">
            <canvas id="weeklyChart"></canvas>
        </div>
    </div>

    <div id="absent-alert" class="alert-box hidden">
        <div class="flex items-center gap-2 mb-2">
            <span class="text-rose-500">⚠️</span>
            <h2 class="text-[10px] font-black text-rose-600 uppercase">Belum Absen (> 08:30)</h2>
        </div>
        <div id="absent-list" class="flex flex-wrap gap-2"></div>
    </div>

    <div class="officer-list-card shadow-sm accordion-section" id="section-officers">
        <div class="accordion-header" onclick="toggleAccordion('officers')">
            <div class="flex items-center gap-2">
                <span class="text-lg">👥</span>
                <h2 class="text-[11px] font-black text-primary dark:text-pink-400 uppercase tracking-widest">Daftar Petugas Lengkap</h2>
            </div>
        </div>
        <div id="full-officer-list" class="collapsible-content space-y-2 overflow-y-auto pr-2" style="scrollbar-width: thin;">
            </div>
    </div>

    <div class="leaderboard-card shadow-sm accordion-section" id="section-leaderboard">
        <div class="accordion-header" onclick="toggleAccordion('leaderboard')">
            <div class="flex items-center gap-2">
                <span class="text-lg">🏆</span>
                <h2 class="text-[11px] font-black text-pink-600 dark:text-pink-400 uppercase tracking-widest">Top 5 Disiplin Bulan Ini</h2>
            </div>
        </div>
        <div id="leaderboard-list" class="collapsible-content space-y-3"></div>
    </div>

    <div class="main-card accordion-section" id="section-controls">
        <div class="accordion-header" onclick="toggleAccordion('controls')">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Kontrol Data & Filter</h2>
        </div>
        <div class="collapsible-content space-y-3">
            <div class="flex justify-end gap-2 mb-2">
                <button onclick="triggerArchive()" class="text-blue-500 font-black text-[10px] uppercase">Archive</button>
                <button onclick="downloadPDF()" class="text-pink-600 font-black text-[10px] uppercase">PDF</button>
                <button onclick="downloadExcel()" class="text-emerald-500 font-black text-[10px] uppercase">Excel</button>
            </div>
            <input type="text" id="search-name" oninput="applyFilters()" placeholder="Cari nama petugas..." class="filter-input">
            <div class="grid grid-cols-2 gap-2">
                <select id="filter-month" onchange="applyFilters()" class="filter-input">
                    <option value="01">Januari</option><option value="02">Februari</option>
                    <option value="03">Maret</option><option value="04">April</option>
                    <option value="05">Mei</option><option value="06">Juni</option>
                    <option value="07">Juli</option><option value="08">Agustus</option>
                    <option value="09">September</option><option value="10">Oktober</option>
                    <option value="11">November</option><option value="12">Desember</option>
                </select>
                <select id="filter-year" onchange="applyFilters()" class="filter-input">
                    <option value="2025">2025</option><option value="2026">2026</option>
                </select>
            </div>
            <select id="filter-status" onchange="applyFilters()" class="filter-input bg-slate-50 border-pink-100">
                <option value="SEMUA">SEMUA STATUS</option>
                <option value="HADIR">HADIR TEPAT WAKTU</option>
                <option value="TERLAMBAT">TERLAMBAT</option>
                <option value="DL">DINAS LUAR (DL)</option>
                <option value="PULANG">PULANG</option>
            </select>
        </div>
    </div>

    <div class="px-5">
        <div class="flex justify-between items-center mb-4 px-2">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Aktivitas Terbaru</h2>
            <button onclick="toggleSelectAll()" class="text-[8px] font-black text-primary uppercase">Pilih Semua</button>
        </div>
        <div id="admin-log-list" class="scroll-area"></div>
    </div>

    <div id="multi-action-bar" class="multi-select-bar">
        <span id="select-count" class="text-[10px] font-black uppercase">0 Terpilih</span>
        <button onclick="deleteSelected()" class="bg-white text-rose-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Hapus Masal</button>
    </div>

    <div class="mt-10 text-center">
        <button onclick="window.history.back()" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest underline">Kembali ke Aplikasi</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyDeWZyUvXj3qVOZXviPgN-d42jswXgkm2cvYlA7OBgGSPX-G_rxYti_rJWGVdpmi_f2A/exec";
    let fullData = { officers: [], logs: [] };
    let selectedRows = [];
    let touchStartX = 0;
    let attendanceChart = null;

    function formatTime(t) {
        if (!t) return "--:--";
        const d = new Date(t);
        return isNaN(d.getTime()) ? t.substring(0,5) : d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark');
        localStorage.setItem('gardena_dark', document.body.classList.contains('dark'));
    }

    // Accordion Logic
    function toggleAccordion(targetId) {
        if (window.innerWidth > 640) return; // Disable on desktop
        
        const sections = ['officers', 'leaderboard', 'controls'];
        sections.forEach(id => {
            const header = document.querySelector(`#section-${id} .accordion-header`);
            const content = document.querySelector(`#section-${id} .collapsible-content`);
            if (id === targetId) {
                const isOpen = content.classList.contains('active');
                header.classList.toggle('active', !isOpen);
                content.classList.toggle('active', !isOpen);
            } else {
                header.classList.remove('active');
                content.classList.remove('active');
            }
        });
    }

    async function initAdmin() {
        if (localStorage.getItem('gardena_user') !== 'ADMIN') { window.location.href = "index.html"; return; }
        if (localStorage.getItem('gardena_dark') === 'true') document.body.classList.add('dark');
        
        // Open controls by default on load
        if (window.innerWidth <= 640) {
            document.querySelector('#section-controls .accordion-header').classList.add('active');
            document.querySelector('#section-controls .collapsible-content').classList.add('active');
        }

        const now = new Date();
        document.getElementById('filter-month').value = (now.getMonth() + 1).toString().padStart(2, '0');
        document.getElementById('filter-year').value = now.getFullYear();
        await loadData();
        setInterval(() => loadData(true), 30000);
    }

    async function loadData(isSilent = false) {
        if (!isSilent) showSkeletons();
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getData`);
            fullData = await res.json();
            updateStats();
            renderChart();
            renderLeaderboard();
            renderFullOfficerList();
            applyFilters();
            checkAbsentees();
        } catch (e) { console.error(e); }
    }

    function updateStats() {
        const today = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\./g, '/');
        const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\./g, '/');
        const logsToday = fullData.logs.filter(l => l.date === today);
        const logsYesterday = fullData.logs.filter(l => l.date === yesterday);
        const uniqueOfficers = [...new Set(fullData.officers)];
        const totalNakes = uniqueOfficers.length;
        const hadirToday = logsToday.filter(l => l.type === 'MASUK' || l.type === 'DL').length;
        const hadirYesterday = logsYesterday.filter(l => l.type === 'MASUK' || l.type === 'DL').length;
        
        const masukTimes = logsToday.filter(l => l.type === 'MASUK').map(l => {
            const timeStr = formatTime(l.time);
            if (!timeStr || timeStr === "--:--") return null;
            const t = timeStr.split(':');
            return parseInt(t[0]) * 60 + parseInt(t[1]);
        }).filter(t => t !== null); 
        
        const avgTimeEl = document.getElementById('avg-time-in');
        if (masukTimes.length > 0) {
            const avgMin = Math.round(masukTimes.reduce((a,b) => a+b) / masukTimes.length);
            const h = Math.floor(avgMin/60).toString().padStart(2,'0');
            const m = (avgMin%60).toString().padStart(2,'0');
            avgTimeEl.innerText = `Rata-rata Masuk: ${h}:${m}`;
        } else {
            avgTimeEl.innerText = `Rata-rata Masuk: --:--`;
        }

        const percentToday = totalNakes > 0 ? Math.round((hadirToday/totalNakes)*100) : 0;
        const percentYesterday = totalNakes > 0 ? Math.round((hadirYesterday/totalNakes)*100) : 0;
        document.getElementById('stat-percent').innerText = percentToday + "%";
        document.getElementById('stat-progress').style.width = percentToday + "%";
        
        const trendEl = document.getElementById('trend-percent');
        if (percentToday > percentYesterday) trendEl.innerHTML = `<span class="trend-up">▲ ${percentToday-percentYesterday}%</span>`;
        else if (percentToday < percentYesterday) trendEl.innerHTML = `<span class="trend-down">▼ ${percentYesterday-percentToday}%</span>`;

        document.getElementById('stat-total').innerText = totalNakes;
        document.getElementById('stat-hadir').innerText = hadirToday;
        document.getElementById('stat-dl').innerText = logsToday.filter(l => l.type === 'DL').length;
    }

    function checkAbsentees() {
        const today = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\./g, '/');
        const hadirNames = fullData.logs.filter(l => l.date === today && (l.type === 'MASUK' || l.type === 'DL')).map(l => l.name);
        const uniqueOfficers = [...new Set(fullData.officers)];
        const absent = uniqueOfficers.filter(name => !hadirNames.includes(name));
        const alertBox = document.getElementById('absent-alert');
        if (absent.length > 0 && new Date().getHours() >= 8 && (new Date().getHours() > 8 || new Date().getMinutes() >= 30)) {
            alertBox.classList.remove('hidden');
            document.getElementById('absent-list').innerHTML = absent.map(name => `<span class="px-2 py-1 bg-rose-100 text-rose-700 text-[8px] font-black rounded-lg uppercase">${name}</span>`).join('');
        } else { alertBox.classList.add('hidden'); }
    }

    function renderFullOfficerList() {
        const uniqueOfficers = [...new Set(fullData.officers)];
        document.getElementById('full-officer-list').innerHTML = uniqueOfficers.map((name, i) => `
            <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-bold text-slate-400">${(i + 1).toString().padStart(2, '0')}</span>
                    <p class="text-[10px] font-black text-slate-700 dark:text-white uppercase">${name}</p>
                </div>
                <span class="w-2 h-2 rounded-full ${fullData.logs.some(l => l.name === name && l.date === new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric'}).replace(/\./g,'/')) ? 'bg-emerald-500' : 'bg-slate-300'}"></span>
            </div>`).join('') || '<p class="text-center text-[9px] text-slate-400 py-4 uppercase">Data petugas belum dimuat</p>';
    }

    function applyFilters() {
        const nameQ = document.getElementById('search-name').value.toLowerCase();
        const month = document.getElementById('filter-month').value;
        const year = document.getElementById('filter-year').value;
        const statusQ = document.getElementById('filter-status').value;
        const container = document.getElementById('admin-log-list');

        const filtered = fullData.logs.filter(l => {
            const dp = l.date.split('/');
            const matchesName = l.name.toLowerCase().includes(nameQ);
            const matchesDate = dp[1] === month && dp[2] === year;
            let matchesStatus = true;
            if (statusQ === "HADIR") matchesStatus = l.type === "MASUK" && (!l.status || !l.status.toUpperCase().includes("TERLAMBAT"));
            else if (statusQ === "TERLAMBAT") matchesStatus = l.status?.toUpperCase().includes("TERLAMBAT");
            else if (statusQ === "DL") matchesStatus = l.type === "DL";
            else if (statusQ === "PULANG") matchesStatus = l.type === "PULANG";
            return matchesName && matchesDate && matchesStatus;
        });

        container.innerHTML = filtered.map((l, idx) => {
            const rowId = l.row || idx;
            return `
            <div class="swipe-container" ontouchstart="handleTS(event)" ontouchmove="handleTM(event, ${rowId})" ontouchend="handleTE(event, ${rowId})">
                <div class="swipe-action" onclick="deleteLog(${rowId}, '${l.name}')">🗑️</div>
                <div id="log-${rowId}" class="log-item shadow-sm">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" value="${rowId}" onchange="updateSelection()" ${selectedRows.includes(rowId) ? 'checked' : ''} class="w-4 h-4 rounded border-slate-300">
                        <div>
                            <p class="text-xs font-black text-slate-800 dark:text-white uppercase">${l.name}</p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase">${l.date} • ${formatTime(l.time)}</p>
                            ${l.type === 'DL' ? `<p class="text-[8px] font-bold text-indigo-500 mt-1 italic">📌 ${l.note || 'Dinas Luar'}</p>` : ''}
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="status-pill ${getStatusColor(l.type)}">${l.type}</span>
                        <p class="text-[8px] font-black mt-1 uppercase ${l.status?.toUpperCase().includes('TERLAMBAT') ? 'text-rose-500 animate-pulse' : 'text-slate-400'}">${l.status || 'OK'}</p>
                    </div>
                </div>
            </div>`;
        }).join('') || '<p class="text-center text-[10px] text-slate-300 py-10 font-bold uppercase">Data Kosong</p>';
    }

    function handleTS(e) { touchStartX = e.touches[0].clientX; }
    function handleTM(e, id) {
        const diff = touchStartX - e.touches[0].clientX;
        const el = document.getElementById(`log-${id}`);
        if (diff > 0 && diff < 100) el.style.transform = `translateX(-${diff}px)`;
    }
    function handleTE(e, id) {
        const el = document.getElementById(`log-${id}`);
        if (touchStartX - e.changedTouches[0].clientX > 50) el.style.transform = `translateX(-80px)`;
        else el.style.transform = `translateX(0)`;
    }

    function updateSelection() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
        selectedRows = Array.from(checkboxes).map(cb => parseInt(cb.value));
        document.getElementById('multi-action-bar').style.display = selectedRows.length > 0 ? 'flex' : 'none';
        document.getElementById('select-count').innerText = `${selectedRows.length} Terpilih`;
    }

    function toggleSelectAll() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const allChecked = Array.from(checkboxes).every(cb => cb.checked);
        checkboxes.forEach(cb => cb.checked = !allChecked);
        updateSelection();
    }

    async function deleteSelected() {
        if (!confirm(`Hapus ${selectedRows.length} data terpilih?`)) return;
        showLoading(true);
        for (let id of selectedRows) await fetch(`${WEB_APP_URL}?action=deleteLog&data=${id}`);
        selectedRows = []; updateSelection(); await loadData(); showLoading(false);
    }

    async function deleteLog(rowId, name) {
        if (!confirm(`Hapus data absensi milik ${name}?`)) return;
        showLoading(true);
        await fetch(`${WEB_APP_URL}?action=deleteLog&data=${rowId}`);
        await loadData(); showLoading(false);
    }

    function showLoading(s) { document.body.style.opacity = s ? "0.5" : "1"; }
    function getStatusColor(t) { return t==='MASUK'?'bg-emerald-100 text-emerald-600':t==='PULANG'?'bg-pink-100 text-pink-600':t==='DL'?'bg-amber-100 text-amber-600':'bg-slate-100'; }

    function renderLeaderboard() {
        const month = document.getElementById('filter-month').value;
        const stats = {};
        fullData.logs.forEach(l => {
            if (l.date.split('/')[1] === month && (l.type === 'MASUK' || l.type === 'DL')) {
                if (!stats[l.name]) stats[l.name] = { score: 0 };
                stats[l.name].score += l.status?.toUpperCase().includes("TERLAMBAT") ? 0.5 : 1;
            }
        });
        const top5 = Object.entries(stats).sort((a,b) => b[1].score - a[1].score).slice(0,5);
        document.getElementById('leaderboard-list').innerHTML = top5.map(([name, data], i) => `
            <div class="flex items-center justify-between bg-white dark:bg-slate-700 p-3 rounded-xl border border-pink-50 dark:border-slate-600">
                <div class="flex items-center gap-3">
                    <div class="rank-badge ${i===0?'bg-yellow-400 text-white':i===1?'bg-slate-300':i===2?'bg-orange-300':'bg-pink-100 text-pink-600'}">${i+1}</div>
                    <p class="text-[10px] font-black text-slate-700 dark:text-white uppercase">${name}</p>
                </div>
                <p class="text-[9px] font-extrabold text-pink-500">${data.score} Pts</p>
            </div>`).join('') || '<p class="text-center text-[9px] text-slate-400 py-4 uppercase">Belum ada data skor</p>';
    }

    function renderChart() {
        const ctx = document.getElementById('weeklyChart').getContext('2d');
        const last7 = []; const counts = [];
        for(let i=6; i>=0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const ds = d.toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric'}).replace(/\./g,'/');
            last7.push(d.toLocaleDateString('id-ID', {weekday:'short'}));
            counts.push(fullData.logs.filter(l => l.date === ds && (l.type==='MASUK'||l.type==='DL')).length);
        }
        if(attendanceChart) attendanceChart.destroy();
        attendanceChart = new Chart(ctx, {
            type:'line', data: { labels: last7, datasets: [{ data: counts, borderColor:'#fff', backgroundColor:'rgba(255,255,255,0.1)', fill:true, tension:0.4, pointRadius:0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#fff', font: { size: 8 } }, grid: { display: false } }, y: { display: false } } }
        });
    }

    async function manualRefresh() {
        const btn = document.getElementById('btn-refresh');
        btn.classList.add('animate-spin'); await loadData(); btn.classList.remove('animate-spin');
    }

    function showSkeletons() {
        document.getElementById('admin-log-list').innerHTML = '<div class="h-16 w-full skeleton rounded-xl mb-2"></div>'.repeat(5);
    }

    async function triggerArchive() {
        if(!confirm("Arsipkan data tahun lalu?")) return;
        showLoading(true); await fetch(`${WEB_APP_URL}?action=archiveData`); await loadData(); showLoading(false);
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.autoTable({ head: [['Nama', 'Tanggal', 'Jam', 'Tipe', 'Status']], body: fullData.logs.map(l => [l.name, l.date, formatTime(l.time), l.type, l.status]), headStyles: {fillColor: [219, 39, 119]} });
        doc.save('GARDENA_REKAP.pdf');
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(fullData.logs.map(l => ({ "Nama": l.name, "Tanggal": l.date, "Jam": formatTime(l.time), "Tipe": l.type, "Status": l.status })));
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Rekap"); XLSX.writeFile(wb, `REKAP_GARDENA.xlsx`);
    }

    window.onload = initAdmin;
</script>
</body>
</html>
